version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: wookie_mysql
    environment:
      MYSQL_DATABASE: wookie_books
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"  # Different port to avoid conflict with local MySQL
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - wookie_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  app:
    build: .
    container_name: wookie_app
    image: wookie-marketplace-app:latest
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: wookie_books
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      RESTRICTED_USERNAME: ${RESTRICTED_USERNAME}
    ports:
      - "8084:8083"  # Different port to avoid conflict with local app
    networks:
      - wookie_network
    restart: unless-stopped

networks:
  wookie_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local