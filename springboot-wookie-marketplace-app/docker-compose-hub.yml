# docker-compose-hub.yml
services:
  mysql:
    image: mysql:8.0
    container_name: wookie_mysql_hub
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: wookie_books
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3308:3306"
    volumes:
      - mysql_data_hub:/var/lib/mysql
    networks:
      - wookie_network_hub
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  app:
    image: vladbogdadocker/wookie-marketplace-app:latest
    container_name: wookie_app_hub
    pull_policy: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: wookie_books
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      RESTRICTED_USERNAME: ${RESTRICTED_USERNAME}
    ports:
      - "8085:8083"
    networks:
      - wookie_network_hub

networks:
  wookie_network_hub:
    driver: bridge

volumes:
  mysql_data_hub:
    driver: local