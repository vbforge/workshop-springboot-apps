spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:wookie_books}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

logging:
  level:
    com.vbforge.wookie: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
    org.flywaydb: INFO

server:
  port: 8083

app:
  secret:
    key: ${JWT_SECRET_KEY}
  token:
    expiration: ${JWT_EXPIRATION:86400000}
  restricted:
    username: ${RESTRICTED_USERNAME:DarthVader}